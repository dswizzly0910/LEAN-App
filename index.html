const SHEETS_CONFIG = {
  WEB_APP_URL: "https://script.google.com/macros/s/AKfycby3G-4IZSLJt9F_o9nrg4KAInTxmFz4uigXQO1fviXMSsqmu2nWugR8QkS2ZYFYMPfPSg/exec",
};

// ── API HELPERS ───────────────────────────────────────────────────────────────
let sheetsConnected = false;
let sheetsError = null;

async function sheetGet(action, params = {}) {
  if (!SHEETS_CONFIG.WEB_APP_URL || SHEETS_CONFIG.WEB_APP_URL.includes("YOUR_APPS")) return null;
  const qs = new URLSearchParams({ action, ...params }).toString();
  const resp = await fetch(`${SHEETS_CONFIG.WEB_APP_URL}?${qs}`);
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Sheet read failed');
  return json.data;
}

async function sheetPost(action, payload = {}) {
  if (!SHEETS_CONFIG.WEB_APP_URL || SHEETS_CONFIG.WEB_APP_URL.includes("YOUR_APPS")) return null;
  const resp = await fetch(SHEETS_CONFIG.WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload }),
  });
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Sheet write failed');
  return json.data;
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadKPIMetrics()  { return sheetGet('getKPIMetrics'); }
async function loadDailyTrends() { return sheetGet('getDailyTrends'); }
async function loadCILog(region, metricKey)  { return sheetGet('getCILog',  { region, metricKey }); }
async function loadPareto(region, metricKey) { return sheetGet('getPareto', { region, metricKey }); }
async function loadOrders(region)            { return sheetGet('getOrders', { region }); }

// ── DATA SAVING ───────────────────────────────────────────────────────────────
async function saveCILog(region, metricKey, ciLog) {
  try { await sheetPost('saveCILog', { region, metricKey, payload: ciLog }); return true; }
  catch(e) { console.error('saveCILog', e); return false; }
}
async function savePareto(region, metricKey, counts) {
  try { await sheetPost('savePareto', { region, metricKey, payload: counts }); return true; }
  catch(e) { console.error('savePareto', e); return false; }
}

// Export all current dashboard data to the sheet in one shot
async function exportAllToSheet(regions, sampleData) {
  const kpiMetrics = [];
  const dailyTrends = [];
  Object.entries(regions).forEach(([regionKey, region]) => {
    Object.entries(region.metrics).forEach(([mk, metric]) => {
      kpiMetrics.push([
        regionKey, mk,
        metric.daily.standard, metric.daily.actual,
        metric.mtd.standard,   metric.mtd.actual,
        metric.monthly?.January ?? '', metric.monthly?.February ?? '',
      ]);
      Object.entries(metric.dailyTrend || {}).forEach(([day, val]) => {
        dailyTrends.push([regionKey, mk, day, val]);
      });
    });
  });
  const orders = sampleData.map(r => [
    'Northeast', r.order, r.status, r.facility, r.billTo, r.manufacturer, r.driver,
    r.deliveryDT||'', r.tfStart||'', r.tfEnd||'',
    r.receiveDT||'', r.actualReceiveDate||'', r.dwellDays??'',
    r.schedOnDate||'', r.presActualReceiveDate||'',
    r.scanType||'', r.totalItems??'', r.shortItems??'', r.cesScore??'', r.audited||'',
  ]);
  return sheetPost('exportAll', { payload: { kpiMetrics, dailyTrends, orders } });
}

}

function jT(seed,base,range,days){const o={};days.forEach((d,i)=>{o[d]=Math.min(1.0,Math.max(0,base+Math.sin(seed*31+i*7)*range));});return o;}
function jD(seed,base,range){const o={};marchTrendDays.forEach((d,i)=>{o[d]=Math.min(1.0,Math.max(0,base+Math.sin(seed*17+i*13)*range));});return o;}
function jitter(seed,base,range){return Math.min(1.0,Math.max(0,base+Math.sin(seed*137+base*1000)*range));}

function buildMetric(key,seed){
  const def=METRIC_DEFS[key];const g=def.goal;
  const bm=def.hib?jitter(seed,g*1.005,g*0.025):jitter(seed,g*0.95,g*0.1);
  const bd=def.hib?jitter(seed+1,g*1.008,g*0.03):jitter(seed+1,g*0.92,g*0.12);
  const bj=def.hib?jitter(seed+2,g*0.998,g*0.02):jitter(seed+2,g*0.95,g*0.1);
  const bf=def.hib?jitter(seed+3,g*1.001,g*0.018):jitter(seed+3,g*0.94,g*0.09);
  const jR=def.hib?g*0.04:g*0.15;
  return{...def,daily:{standard:g,actual:bd},mtd:{standard:g,actual:bm},monthly:{January:bj,February:bf},januaryTrend:jT(seed+10,bj,jR,janDays),februaryTrend:jT(seed+20,bf,jR,febDays),dailyTrend:jD(seed+30,bm,jR),pareto:{},ciLog:[]};
}
function makeRegionMetrics(rk,seed){return Object.fromEntries(REGION_METRIC_KEYS[rk].map((k,i)=>[k,buildMetric(k,seed*100+i)]));}

const CWD=[24,25,26,27];
function weeklyAvg(metric){const vals=CWD.map(d=>metric.dailyTrend[d]).filter(v=>v!=null);if(!vals.length)return metric.mtd.actual;return vals.reduce((s,v)=>s+v,0)/vals.length;}
function metricHit(key,value){const def=METRIC_DEFS[key];return def.hib?value>=def.goal:value<=def.goal;}
function normScore(key,value){const def=METRIC_DEFS[key];if(def.hib)return Math.min(1,value);return Math.max(0,Math.min(1,1-(value-def.goal)/def.goal));}
function overallScore(metrics){const ks=Object.keys(metrics);return ks.map(k=>normScore(k,weeklyAvg(metrics[k]))).reduce((s,v)=>s+v,0)/ks.length;}
function fmtM(key,value){if(value==null)return"—";const def=METRIC_DEFS[key];if(!def)return pct(value);return def.fmt==="pct"?pct(def.hib?Math.min(1,value):value):`${Math.round(value)}d`;}

function getMonthInfo(name,year){
  const i=MONTHS.indexOf(name);if(i<0)return{weekendSet:MARCH_WEEKENDS,daysInMonth:31,firstDow:0};
  const fd=new Date(year,i,1).getDay();const dim=new Date(year,i+1,0).getDate();
  const ws=new Set();for(let d=1;d<=dim;d++){if((fd+d-1)%7===0||(fd+d-1)%7===6)ws.add(d);}
  return{weekendSet:ws,daysInMonth:dim,firstDow:fd};
}

function GaugeBar({actual,goal,onCard,hib=true}){
  const hit=hib?actual>=goal:actual<=goal;
  const MIN=0.85;
  // Map actual into [MIN,1.0] range -> [0%,100%] for hib; invert for lower-is-better
  const w=hib
    ?Math.min(100,Math.max(0,((actual??0)-MIN)/(1.0-MIN)*100))
    :Math.max(0,100-Math.min(100,Math.max(0,((actual??0)-0)/(goal*2)*100)));
  const gp=hib?(goal-MIN)/(1.0-MIN)*100:100-(goal/(goal*2))*100;
  return <div style={{position:"relative",height:10,background:onCard?"rgba(255,255,255,0.2)":C.blueLight,borderRadius:5,overflow:"visible",marginTop:6}}>
    <div style={{width:`${w}%`,height:"100%",background:perfColor(hit),borderRadius:5,transition:"width 0.5s"}}/>
    <div style={{position:"absolute",top:-4,left:`${gp}%`,width:2,height:18,background:onCard?C.white:C.darkBlue,borderRadius:1,opacity:0.6}}/>
  </div>;
}

function MiniChart({data,goal,weekendSet,monthLabel,daysInMonth,hib=true}){
  const days=Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>!weekendSet.has(d));
  const pts=days.filter(d=>data[d]!=null).map(d=>({d,v:data[d]}));
  if(!pts.length)return <div style={{color:C.grayDark,fontSize:13,padding:"20px 0",fontFamily:FONT}}>No data for {monthLabel}</div>;
  const allV=pts.map(p=>p.v);
  const mn=Math.min(hib?goal-0.06:0,...allV);const mx=Math.max(hib?1.005:goal*1.5,...allV);const rng=mx-mn||0.01;
  const W=440,H=110,PL=8,PR=52,PT=8,PB=28;
  const x=d=>PL+((d-1)/(daysInMonth-1))*(W-PL-PR);const y=v=>H-PB-((v-mn)/rng)*(H-PT-PB);
  const gy=y(goal);
  const pd=pts.map((p,i)=>`${i===0?"M":"L"}${x(p.d).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ");
  const ad=`${pd} L${x(pts[pts.length-1].d).toFixed(1)},${H-PB} L${x(pts[0].d).toFixed(1)},${H-PB} Z`;
  const lp=pts.filter((p,i)=>i===0||x(p.d)-x(pts[i-1].d)>=22);
  const sm=monthLabel.slice(0,3);
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible",display:"block"}}>
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.blue} stopOpacity="0.15"/><stop offset="100%" stopColor={C.blue} stopOpacity="0.01"/></linearGradient></defs>
    <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke={C.gray} strokeWidth={1}/>
    <line x1={PL} y1={gy} x2={W-PR} y2={gy} stroke={C.darkBlue} strokeOpacity={0.3} strokeDasharray="6,4" strokeWidth={1.5}/>
    <text x={W-PR+4} y={gy+4} fontSize={11} fill={C.darkBlue} opacity={0.6} fontFamily={FONT} fontWeight="700">Target</text>
    <path d={ad} fill="url(#ag)"/><path d={pd} fill="none" stroke={C.blue} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map(p=><circle key={p.d} cx={x(p.d)} cy={y(p.v)} r={4.5} fill={(hib?p.v>=goal:p.v<=goal)?C.green:C.red} stroke={C.white} strokeWidth={1.5}/>)}
    {lp.map(p=><g key={`t${p.d}`}><line x1={x(p.d)} y1={H-PB} x2={x(p.d)} y2={H-PB+4} stroke={C.grayDark} strokeWidth={1}/><text x={x(p.d)} y={H-PB+15} textAnchor="middle" fontSize={10} fill={C.grayDark} fontFamily={FONT}>{`${sm} ${p.d}`}</text></g>)}
  </svg>;
}

function CalendarGrid({data,goal,monthName,year,hib=true}){
  const {weekendSet,daysInMonth,firstDow}=getMonthInfo(monthName,year);
  const ac=[...Array(firstDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(ac.length%7!==0)ac.push(null);
  const rows=[];for(let i=0;i<ac.length;i+=7)rows.push(ac.slice(i,i+7));
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:5}}>
      {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:C.grayDark,fontWeight:700,fontFamily:FONT}}>{d}</div>)}
    </div>

      {row.map((d,ci)=>{
        if(!d)return <div key={ci} style={{aspectRatio:"1"}}/>;
        const iw=weekendSet.has(d);const v=data[d];const hd=v!=null;const hit=hd&&(hib?v>=goal:v<=goal);

          <span>{d}</span>{hd&&!iw&&<span style={{fontSize:8,fontWeight:400}}>{pct(v)}</span>}
        </div>;
      })}
    </div>)}
  </div>;
}

function PCalendar({data,goal,hib=true}){

function ParetoView({metric,ps,setPs}){
  const [customCodes,setCustomCodes]=useState([]);
  const [removedBuiltIn,setRemovedBuiltIn]=useState([]);
  const [newCode,setNewCode]=useState("");
  const [addMsg,setAddMsg]=useState("");

  const builtInRs=Object.keys(metric.pareto||{});
  const rs=[...builtInRs.filter(k=>!removedBuiltIn.includes(k)),...customCodes];
  const sv=ps[0]||rs.reduce((a,k)=>({...a,[k]:0}),{});
  const [dr,setDr]=useState({...sv});
  const [msg,setMsg]=useState(false);

  const tot=Object.values(sv).reduce((s,v)=>s+v,0);
  const srt=[...rs].sort((a,b)=>(sv[b]||0)-(sv[a]||0));
  const bc=[C.darkBlue,C.blue,"#5b8db8","#7aafcf","#9eb8cc",C.grayDark,"#a0aec0"];
  const is={background:C.offWhite,border:`1px solid ${C.gray}`,borderRadius:5,color:C.darkBlue,padding:"6px 8px",fontSize:13,width:"100%",boxSizing:"border-box",fontFamily:FONT};
  const save=()=>{setPs([{...dr}]);setMsg(true);setTimeout(()=>setMsg(false),2000);};

  const addCode=()=>{
    const trimmed=newCode.trim();
    if(!trimmed)return;
    if(rs.includes(trimmed)){setAddMsg("Already exists");setTimeout(()=>setAddMsg(""),2000);return;}
    setCustomCodes(prev=>[...prev,trimmed]);
    setDr(prev=>({...prev,[trimmed]:0}));
    setNewCode("");
    setAddMsg("Added!");
    setTimeout(()=>setAddMsg(""),2000);
  };

  const removeCode=code=>{
    if(builtInRs.includes(code)){
      setRemovedBuiltIn(prev=>[...prev,code]);
    } else {
      setCustomCodes(prev=>prev.filter(c=>c!==code));
    }
    setDr(prev=>{const n={...prev};delete n[code];return n;});
    setPs([Object.fromEntries(Object.entries(ps[0]||{}).filter(([k])=>k!==code))]);
  };

  return <div>
    <Card title="Reason Codes (MTD)">
      {rs.length===0
        ? <div style={{color:C.grayDark,fontSize:13,marginBottom:14,fontStyle:"italic"}}>No reason codes yet — add one below.</div>
        : <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {rs.map(r=><div key={r} style={{position:"relative"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:12,color:C.darkBlue,fontWeight:600}}>{r}</div>
                <button onClick={()=>removeCode(r)} title="Remove reason code" style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,padding:"0 4px",lineHeight:1,opacity:0.7}}>×</button>
              </div>
              <input type="number" min={0} value={dr[r]??0} onChange={e=>setDr(p=>({...p,[r]:parseInt(e.target.value)||0}))} style={is}/>
            </div>)}
          </div>
      }

      {/* Add new reason code */}
      <div style={{borderTop:`1px solid ${C.gray}`,paddingTop:14,marginTop:4}}>
        <div style={{fontSize:12,color:C.darkBlue,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Add Reason Code</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="text" value={newCode} onChange={e=>setNewCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCode()}
            placeholder="e.g. Weather, Equipment Failure…"
            style={{...is,flex:1,padding:"7px 10px"}}/>
          <button onClick={addCode} style={{background:C.blue,border:"none",borderRadius:6,padding:"7px 18px",color:C.white,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"}}>+ Add</button>
          {addMsg&&<span style={{fontSize:13,color:addMsg==="Added!"?C.green:C.red,fontWeight:700,whiteSpace:"nowrap"}}>{addMsg}</span>}
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginTop:14}}>
        <button onClick={save} style={{background:C.darkBlue,border:"none",borderRadius:6,padding:"8px 22px",color:C.white,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:FONT}}>💾 Save</button>
        {msg&&<span style={{fontSize:13,color:C.green,fontWeight:700}}>✓ Saved!</span>}
      </div>
    </Card>
    {tot>0&&<Card title="Pareto Analysis" noTitleBorder={true}>
      {(()=>{
        const visItems=srt.filter(r=>(sv[r]||0)>0);
        const maxV=Math.max(...visItems.map(r=>sv[r]||0));
        const CHART_H=220;const BAR_AREA=0.7;
        // Cumulative % points for line
        let cumPct=0;
        const cumPts=visItems.map(r=>{cumPct+=(sv[r]||0)/tot*100;return cumPct;});
        return <div>
          {/* Chart container */}
          <div style={{position:"relative",marginBottom:8}}>
            {/* Y-axis gridlines + left labels */}
            <div style={{position:"absolute",top:0,left:0,right:40,bottom:28,pointerEvents:"none"}}>
              {[0,25,50,75,100].map(pv=>{
                const yPct=100-pv;
                return <div key={pv} style={{position:"absolute",top:`${yPct}%`,left:0,right:0,display:"flex",alignItems:"center"}}>
                  <span style={{fontSize:10,color:C.grayDark,width:28,textAlign:"right",flexShrink:0,marginRight:4}}>{pv}</span>
                  <div style={{flex:1,borderTop:`1px solid ${pv===0?"#ccc":"#eee"}`}}/>
                </div>;
              })}
            </div>
            {/* Right Y-axis labels (cumulative %) */}
            <div style={{position:"absolute",top:0,right:0,bottom:28,width:36,pointerEvents:"none"}}>
              {[0,25,50,75,100].map(pv=>{
                const yPct=100-pv;
                return <div key={pv} style={{position:"absolute",top:`${yPct}%`,right:0,transform:"translateY(-50%)"}}>
                  <span style={{fontSize:10,color:C.amber}}>{pv}%</span>
                </div>;
              })}
            </div>
            {/* Bar + line SVG area */}
            <div style={{marginLeft:36,marginRight:40,height:CHART_H,position:"relative",marginBottom:52}}>
              <svg width="100%" height={CHART_H} style={{display:"block",overflow:"visible"}}>
                {(()=>{
                  const n=visItems.length;
                  const barW=Math.min(60,BAR_AREA/n*100);
                  const gap=(100-barW*n)/(n+1);
                  return visItems.map((r,i)=>{
                    const v=sv[r]||0;
                    const barH=(v/maxV)*CHART_H*0.85;
                    const x=`${gap*(i+1)+barW*i}%`;
                    const bw=`${barW}%`;
                    const barColor=bc[i]||C.grayDark;
                    const cx=`${gap*(i+1)+barW*i+barW/2}%`;
                    const lineY=CHART_H-(cumPts[i]/100)*CHART_H;
                    const prevY=i>0?CHART_H-(cumPts[i-1]/100)*CHART_H:null;
                    const prevCx=i>0?`${gap*i+barW*(i-1)+barW/2}%`:null;
                    return <g key={r}>
                      {/* Bar */}
                      <rect x={x} y={CHART_H-barH} width={bw} height={barH} fill={barColor} rx={3}/>
                      {/* Bar value label */}
                      <text x={cx} y={CHART_H-barH-6} textAnchor="middle" fontSize={11} fill={barColor} fontWeight="700" fontFamily={FONT}>{v}</text>
                      {/* Cumulative line segment */}
                      {prevY!=null&&<line x1={prevCx} y1={prevY} x2={cx} y2={lineY} stroke={C.amber} strokeWidth={2.5} strokeLinecap="round"/>}
                      {/* Cumulative dot */}
                      <circle cx={cx} cy={lineY} r={5} fill={C.amber} stroke={C.white} strokeWidth={1.5}/>
                      {/* Cumulative label */}
                      <text x={cx} y={lineY-9} textAnchor="middle" fontSize={10} fill={C.amber} fontWeight="700" fontFamily={FONT}>{cumPts[i].toFixed(0)}%</text>
                    </g>;
                  });
                })()}
              </svg>
              {/* X-axis labels */}
              <div style={{display:"flex",position:"absolute",bottom:-44,left:0,right:0}}>
                {visItems.map((r,i)=>{
                  const n=visItems.length;
                  const barW=Math.min(60,BAR_AREA/n*100);
                  const gap=(100-barW*n)/(n+1);
                  return <div key={r} style={{position:"absolute",left:`${gap*(i+1)+barW*i+barW/2}%`,transform:"translateX(-50%)",textAlign:"center",width:`${barW+gap+4}%`}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.darkBlue,fontFamily:FONT,lineHeight:1.3,display:"block",whiteSpace:"normal",wordBreak:"break-word"}}>{r}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:20,marginTop:32,paddingTop:10,borderTop:`1px solid ${C.gray}`,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.grayDark,fontFamily:FONT}}>
              <span style={{width:14,height:14,borderRadius:3,background:C.darkBlue,display:"inline-block"}}/>Occurrences
            </span>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.grayDark,fontFamily:FONT}}>
              <span style={{width:20,height:3,background:C.amber,display:"inline-block",borderRadius:2}}/>Cumulative %
            </span>
            <span style={{marginLeft:"auto",fontSize:13,color:C.darkBlue,fontWeight:700,fontFamily:FONT}}>Total: {tot}</span>
          </div>
        </div>;
      })()}
    </Card>}
  </div>;
}

function CILogView({ciLog,setCiLog,regionKey,saving=false,saveMsg=""}){

  const [form,setForm]=useState(bl);const [sb,setSb]=useState("date");const [hc,setHc]=useState(false);

              :filtered.map((row,i)=>(

                  {metricId!=="Dwell"&&<td style={tdStyle}>{row.deliveryDT||"—"}</td>}
                  {metricId==="Dwell"&&<td style={tdStyle}>{row.actualReceiveDate||"—"}</td>}
                  {metricId==="Dwell"&&<td style={tdStyle}>{row.deliveryDT||"—"}</td>}
                  {metricId==="Dwell"&&<td style={{...tdStyle,fontWeight:700,color:row.dwellDays>6?C.red:C.green}}>{row.dwellDays!=null?`${row.dwellDays}`:"—"}</td>}
                  {metricId==="Preschedule"&&<td style={tdStyle}>{row.schedOnDate||"—"}</td>}
                  {metricId==="Preschedule"&&<td style={tdStyle}>{row.presActualReceiveDate||"—"}</td>}
                  {metricId==="Preschedule"&&<td style={tdStyle}>{row.deliveryDT||"—"}</td>}
                  {metricId==="OT"&&<td style={tdStyle}>{row.tfStart||"—"}</td>}
                  {metricId==="OT"&&<td style={tdStyle}>{row.tfEnd||"—"}</td>}
                  {metricId==="Scanning"&&<td style={tdStyle}>{row.scanType||"—"}</td>}
                  {metricId==="Shortages"&&<td style={tdStyle}>{row.totalItems??"-"}</td>}
                  {metricId==="Shortages"&&<td style={{...tdStyle,color:row.shortItems>0?C.red:C.darkBlue,fontWeight:row.shortItems>0?700:400}}>{row.shortItems??"-"}</td>}
                  {metricId==="CES"&&<td style={{...tdStyle,fontWeight:700,fontSize:14,color:row.cesScore>=5?C.green:C.red,textAlign:"center"}}>{row.cesScore??"-"}</td>}

                </tr>

    </div>
    <div style={{marginTop:6,fontSize:11,color:C.grayDark}}>Showing {filtered.length} of {SAMPLE_DATA.length} records · click headers to sort</div>
  </div>;
}

function RegionDashboard({region,regionKey,sheetsData}){
  const m=region.metrics;const fk=Object.keys(m)[0];
  const [sm,setSm]=useState(fk);const [tab,setTab]=useState("trend");
  const [ps,setPs]=useState(Object.fromEntries(Object.keys(m).map(k=>[k,[Object.fromEntries(Object.keys(m[k].pareto||{}).map(r=>[r,0]))]])));
  const [cl,setCl]=useState(Object.fromEntries(Object.keys(m).map(k=>[k,m[k].ciLog||[]])));
  const [sheetsSaving,setSheetsSaving]=useState(false);
  const [sheetsSaveMsg,setSheetsSaveMsg]=useState("");

  // Load CI Log + Pareto from Sheets on mount (if connected)
  React.useEffect(()=>{
    if(!sheetsConnected) return;
    Object.keys(m).forEach(async mk=>{
      const [ciData, paretoData] = await Promise.all([
        loadCILog(regionKey, mk),
        loadPareto(regionKey, mk),
      ]);
      if(ciData) setCl(prev=>({...prev,[mk]:ciData}));
      if(paretoData) setPs(prev=>({...prev,[mk]:[paretoData]}));
    });
  },[regionKey]);

  // Save CI Log to Sheets
  const saveCIToSheets = async (mk, log) => {
    if(!sheetsConnected) return;
    setSheetsSaving(true);
    const ok = await saveCILog(regionKey, mk, log);
    setSheetsSaveMsg(ok ? "✓ Saved to Sheets" : "⚠ Save failed");
    setSheetsSaving(false);
    setTimeout(()=>setSheetsSaveMsg(""),3000);
  };

  // Save Pareto to Sheets
  const saveParetoToSheets = async (mk, counts) => {
    if(!sheetsConnected) return;
    await savePareto(regionKey, mk, counts);
  };
  const mt=m[sm];const hib=mt.hib??true;
  const tabs=[{id:"trend",l:"Trend"},{id:"pareto",l:"Pareto"},{id:"ci",l:"CI Log"},{id:"data",l:"Data"}];
  return <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
    <div style={{width:270,borderRight:`1px solid ${C.gray}`,overflowY:"auto",padding:"14px 10px",background:C.offWhite,flexShrink:0}}>
      <div style={{fontSize:10,color:C.grayDark,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>KPI Metrics</div>
      {Object.entries(m).map(([id,metric])=><MetricCard key={id} id={id} metric={metric} onClick={id=>{setSm(id);setTab("trend");}} selected={sm===id}/>)}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:11,color:C.grayDark,fontWeight:700,textTransform:"uppercase"}}>{mt.category}</div>
          <div style={{fontSize:24,fontWeight:700,color:C.darkBlue}}>{mt.label}</div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {[["Daily Tgt",mt.daily.standard,false],["Daily Act",mt.daily.actual,true],["MTD Tgt",mt.mtd.standard,false],["MTD Act",mt.mtd.actual,true],["MTD Gap",mt.mtd.actual-mt.mtd.standard,true]].map(([l,v,col])=>{
            const ig=l==="MTD Gap";const hit=ig?(hib?v>=0:v<=0):(hib?v>=mt.goal:v<=mt.goal);
            return <div key={l} style={{background:C.white,borderRadius:8,padding:"7px 11px",textAlign:"center",border:`1px solid ${C.gray}`,minWidth:70}}>
              <div style={{fontSize:9,color:C.grayDark,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>{l}</div>
              <div style={{fontSize:14,fontWeight:700,color:col?perfColor(hit):C.darkBlue}}>{ig?`${(hib?v>=0:v<=0)?"+":""}${(Math.abs(v)*100).toFixed(2)}pp`:fmtM(sm,v)}</div>
            </div>;
          })}
        </div>
      </div>
      <div style={{display:"flex",marginBottom:18,borderBottom:`2px solid ${C.gray}`}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",padding:"8px 18px",fontSize:13,fontWeight:700,color:tab===t.id?C.darkBlue:C.grayDark,borderBottom:tab===t.id?`3px solid ${C.blue}`:"3px solid transparent",cursor:"pointer",marginBottom:-2,fontFamily:FONT}}>{t.l}</button>)}
      </div>
      {tab==="trend"&&<TrendView metric={mt} metricId={sm}/>}
      {tab==="pareto"&&<ParetoView metric={mt} ps={ps[sm]} setPs={v=>{setPs(p=>({...p,[sm]:v}));if(v[0])saveParetoToSheets(sm,v[0]);}}/>}
      {tab==="ci"&&<CILogView ciLog={cl[sm]} setCiLog={v=>{setCl(p=>({...p,[sm]:v}));saveCIToSheets(sm,v);}} regionKey={regionKey} saving={sheetsSaving} saveMsg={sheetsSaveMsg}/>}
      {tab==="data"&&<DataView metricId={sm}/>}
    </div>
  </div>;
}


// Last 4 weeks of daily trend day buckets
const WEEKS=[
  {label:"Wk of 4/7",  days:[3,4,5,6]},
  {label:"Wk of 4/14", days:[10,11,12,13]},
  {label:"Wk of 4/21", days:[17,18,19,20]},
  {label:"Wk of 5/4",  days:[24,25,26,27]},
];

function weekAvgForDays(metric,days){
  const vals=days.map(d=>metric.dailyTrend[d]).filter(v=>v!=null);
  if(!vals.length)return null;
  return vals.reduce((s,v)=>s+v,0)/vals.length;
}

function TrendsView(){
  const [trendsView,setTrendsView]=useState("byRegion");

  // Gray trend lines, colored dots
  function Spark({values,goal,hib=true,width=90,height=36}){
    const valid=values.filter(v=>v!=null);
    if(valid.length<2)return <span style={{fontSize:13,color:C.grayDark}}>—</span>;
    const mn=Math.min(...valid)*0.995;const mx=Math.max(...valid)*1.005;const rng=mx-mn||0.01;
    const W=width,H=height;
    const pts=values.map((v,i)=>v!=null?{x:i/(values.length-1)*W,y:H-((v-mn)/rng)*(H-4)+2}:null).filter(Boolean);
    const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    const goalY=goal!=null?H-((goal-mn)/rng)*(H-4)+2:null;
    return <svg viewBox={`0 0 ${W} ${H}`} style={{width:W,height:H,display:"block",overflow:"visible"}}>
      {goalY!=null&&goalY>=0&&goalY<=H&&<line x1={0} y1={goalY} x2={W} y2={goalY} stroke={C.darkBlue} strokeOpacity={0.3} strokeDasharray="4,3" strokeWidth={1.5}/>}
      <path d={path} fill="none" stroke="#9ca3af" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>{const v=values[i];const h=v!=null&&(hib?v>=goal:v<=goal);return <circle key={i} cx={p.x} cy={p.y} r={4} fill={h?C.green:C.red} stroke={C.white} strokeWidth={1.5}/>;})}
    </svg>;
  }

  // Overall overperformance summary: for each week, avg normalised score across ALL regions & their metrics
  const overallWkPerf=WEEKS.map(w=>{
    let total=0;let count=0;
    Object.entries(REGIONS).forEach(([rk,region])=>{
      REGION_METRIC_KEYS[rk].forEach(mk=>{
        const metric=region.metrics[mk];
        const v=weekAvgForDays(metric,w.days);
        if(v!=null){total+=normScore(mk,v);count++;}
      });
    });
    return count>0?total/count:null;
  });

  const vl=`1px solid ${C.gray}`;  // vertical gridline

  return <div style={{overflowY:"auto",padding:"28px 32px",height:"100%"}}>
    <div style={{marginBottom:22}}>

      <div style={{fontSize:13,color:C.grayDark,marginTop:4}}>Weekly averages per region · Mar–May 2026</div>
    </div>

    {/* Overall Performance Summary Card */}
    <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.gray}`,padding:"20px 24px",marginBottom:28,boxShadow:"0 1px 4px rgba(0,47,86,0.06)"}}>
      <div style={{fontSize:13,fontWeight:700,color:C.darkBlue,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:16,paddingBottom:10,borderBottom:`2px solid ${C.blue}`}}>Overall Performance by Region — Last 4 Weeks</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:C.darkBlue}}>
              <th style={{padding:"7px 12px",textAlign:"left",fontSize:12,fontWeight:700,color:C.white,borderRight:`1px solid ${C.darkBlue4}`,fontFamily:FONT,whiteSpace:"nowrap"}}>Region</th>
              {WEEKS.map((w,wi)=><th key={w.label} style={{padding:"7px 12px",textAlign:"center",fontSize:12,fontWeight:700,color:C.white,borderRight:`1px solid ${C.darkBlue4}`,fontFamily:FONT,whiteSpace:"nowrap"}}>{w.label}</th>)}
              <th style={{padding:"7px 12px",textAlign:"center",fontSize:12,fontWeight:700,color:C.blue,fontFamily:FONT,whiteSpace:"nowrap"}}>Trend</th>
              <th style={{padding:"7px 12px",textAlign:"center",fontSize:12,fontWeight:700,color:C.white,fontFamily:FONT,borderLeft:`1px solid ${C.darkBlue4}`}}>Target</th>
            </tr>
          </thead>
          <tbody>
            {/* Overall all-regions row */}
            {(()=>{
              const hit=overallWkPerf[overallWkPerf.length-1]!=null&&overallWkPerf[overallWkPerf.length-1]>=0.95;
              return <tr style={{background:C.darkBlue3}}>
                <td style={{padding:"7px 12px",fontSize:13,fontWeight:700,color:C.white,borderBottom:`1px solid ${C.darkBlue4}`,borderRight:`1px solid ${C.darkBlue4}`,fontFamily:FONT}}>All Regions</td>
                {overallWkPerf.map((v,wi)=>{const h=v!=null&&v>=0.95;return <td key={wi} style={{padding:"7px 12px",textAlign:"center",fontSize:13,fontWeight:700,color:v!=null?perfColor(h):"#ccc",borderBottom:`1px solid ${C.darkBlue4}`,borderRight:`1px solid ${C.darkBlue4}`,fontFamily:FONT}}>{v!=null?pct(v):"—"}</td>;})}
                <td style={{padding:"6px 12px",textAlign:"center",borderBottom:`1px solid ${C.darkBlue4}`,borderRight:`1px solid ${C.darkBlue4}`}}><Spark values={overallWkPerf} goal={0.95} hib={true} width={110} height={40}/></td>

                <td style={{padding:"6px 12px",textAlign:"center",borderBottom:`1px solid ${C.gray}`,borderRight:`1px solid ${C.gray}`}}><Spark values={wkScores} goal={0.95} hib={true} width={110} height={40}/></td>

              <tbody>
                {mks.map((mk,mki)=>{
                  const metric=region.metrics[mk];const d=METRIC_DEFS[mk];
                  const wv=WEEKS.map(w=>weekAvgForDays(metric,w.days));
                  const rowBg=mki%2===0?C.white:C.offWhite;
                  return <tr key={mk} style={{background:rowBg}}>
                    <td style={{fontSize:12,color:C.grayDark,padding:"5px 8px",fontFamily:FONT,borderBottom:`1px solid ${C.gray}`,borderRight:vl,whiteSpace:"nowrap"}}>{d.label}</td>
                    {wv.map((v,wi)=>{
                      const h=v!=null&&(d.hib?v>=d.goal:v<=d.goal);
                      return <td key={wi} style={{textAlign:"center",fontSize:13,fontWeight:700,color:v!=null?perfColor(h):C.grayMid,padding:"5px 8px",borderBottom:`1px solid ${C.gray}`,borderRight:wi<wv.length-1?vl:"none",fontFamily:FONT}}>{v!=null?fmtM(mk,v):"—"}</td>;
                    })}
                    <td style={{textAlign:"center",padding:"4px 8px",borderBottom:`1px solid ${C.gray}`}}>
                      <Spark values={wv} goal={d.goal} hib={d.hib}/>
                    </td>
                    <td style={{textAlign:"center",fontSize:12,color:C.grayDark,padding:"5px 8px",borderBottom:`1px solid ${C.gray}`,borderLeft:vl,fontFamily:FONT}}>{fmtM(mk,d.goal)}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>;
      })}
    </div>}

    {/* View: All Regions by Metric */}
    {trendsView==="byMetric"&&<div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:18}}>
      {["OT","COT","Scanning","POD","Call","Shortages","Preschedule","CES","RNS","Dwell"].filter(mk=>Object.values(REGIONS).some(r=>r.metrics[mk])).map(mk=>{
        const d=METRIC_DEFS[mk];
        const regions=Object.entries(REGIONS).filter(([rk])=>REGION_METRIC_KEYS[rk].includes(mk));
        return <div key={mk} style={{background:C.white,borderRadius:10,border:`1px solid ${C.gray}`,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,47,86,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12,paddingBottom:10,borderBottom:`2px solid ${C.blue}`}}>
            <div style={{fontSize:15,fontWeight:700,color:C.darkBlue}}>{d.label}</div>
            <div style={{fontSize:12,color:C.grayDark,fontFamily:FONT}}>Target: <strong style={{color:C.darkBlue}}>{fmtM(mk,d.goal)}</strong>{!d.hib&&<span style={{fontSize:10,color:C.amber,marginLeft:4}}>(lower=better)</span>}</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:C.offWhite}}>
                  <th style={{fontSize:12,color:C.darkBlue,fontWeight:700,textAlign:"left",padding:"5px 8px",borderBottom:`2px solid ${C.gray}`,borderRight:vl,fontFamily:FONT,whiteSpace:"nowrap"}}>Region</th>
                  {WEEKS.map((w,wi)=><th key={w.label} style={{fontSize:12,color:C.darkBlue,fontWeight:700,textAlign:"center",padding:"5px 8px",borderBottom:`2px solid ${C.gray}`,borderRight:wi<WEEKS.length-1?vl:"none",fontFamily:FONT,whiteSpace:"nowrap"}}>{w.label}</th>)}
                  <th style={{fontSize:12,color:C.darkBlue,fontWeight:700,textAlign:"center",padding:"5px 8px",borderBottom:`2px solid ${C.gray}`,fontFamily:FONT}}>Trend</th>
                </tr>
              </thead>
              <tbody>
                {regions.map(([rk,region],ri)=>{
                  const metric=region.metrics[mk];
                  const wv=WEEKS.map(w=>weekAvgForDays(metric,w.days));
                  return <tr key={rk} style={{background:ri%2===0?C.white:C.offWhite}}>
                    <td style={{fontSize:12,color:C.grayDark,padding:"5px 8px",fontFamily:FONT,borderBottom:`1px solid ${C.gray}`,borderRight:vl,whiteSpace:"nowrap",fontWeight:600}}>{region.label}</td>
                    {wv.map((v,wi)=>{
                      const h=v!=null&&(d.hib?v>=d.goal:v<=d.goal);
                      return <td key={wi} style={{textAlign:"center",fontSize:13,fontWeight:700,color:v!=null?perfColor(h):C.grayMid,padding:"5px 8px",borderBottom:`1px solid ${C.gray}`,borderRight:wi<wv.length-1?vl:"none",fontFamily:FONT}}>{v!=null?fmtM(mk,v):"—"}</td>;
                    })}
                    <td style={{textAlign:"center",padding:"4px 8px",borderBottom:`1px solid ${C.gray}`}}>
                      <Spark values={wv} goal={d.goal} hib={d.hib}/>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

function SummaryView({onDrillDown}){
  const [summaryView,setSummaryView]=useState("byRegion");
  const ranked=Object.entries(REGIONS).map(([k,r])=>({k,r,s:overallScore(r.metrics)})).sort((a,b)=>b.s-a.s);
  return <div style={{overflowY:"auto",padding:"24px 28px",height:"100%"}}>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:20,fontWeight:700,color:C.darkBlue}}>Weekly Summary — Week of 5/4</div>
      <div style={{fontSize:12,color:C.grayDark,marginTop:3}}>Click any card or row to drill in.</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:28}}>
      {ranked.map(({k,r,s},rank)=>{
        const mks=REGION_METRIC_KEYS[k];const mh=mks.filter(mk=>metricHit(mk,weeklyAvg(r.metrics[mk]))).length;
        const sc=s>=0.95?C.green:s>=0.90?C.amber:C.red;
        return <div key={k} onClick={()=>onDrillDown(k)}
          style={{background:C.white,borderRadius:10,padding:"16px 18px",border:`2px solid ${sc}`,cursor:"pointer",position:"relative",transition:"transform 0.12s,box-shadow 0.12s"}}
          onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 18px rgba(0,47,86,0.15)";}}
          onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
          {rank<3&&<div style={{position:"absolute",top:10,right:12,fontSize:16}}>{rank===0?"🥇":rank===1?"🥈":"🥉"}</div>}
          <div style={{fontSize:10,color:C.grayDark,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{r.label}</div>
          <div style={{fontSize:32,fontWeight:700,color:sc,lineHeight:1,marginBottom:2}}>{pct(s)}</div>
          <div style={{fontSize:11,color:C.grayDark,marginBottom:7}}>{mh}/{mks.length} KPIs on target this week</div>
          <GaugeBar actual={s} goal={0.95}/>
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4}}>
            {mks.map(mk=>{const v=weeklyAvg(r.metrics[mk]);const h=metricHit(mk,v);const def=METRIC_DEFS[mk];return <div key={mk} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11}}>
              <span style={{color:C.grayDark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}}>{def.label}</span>
              <span style={{fontWeight:700,color:perfColor(h),flexShrink:0,marginLeft:6}}>{fmtM(mk,v)}</span>
            </div>;})}
          </div>
          <div style={{marginTop:10,fontSize:11,color:C.blue,textAlign:"right"}}>View detail →</div>
        </div>;
      })}
    </div>
    {/* Toggle */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.darkBlue,textTransform:"uppercase",letterSpacing:"0.06em"}}>
        {summaryView==="byRegion"?"Performance by Region Group":"Performance by Metric"}
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setSummaryView("byRegion")} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,border:`1px solid ${summaryView==="byRegion"?C.blue:C.gray}`,background:summaryView==="byRegion"?C.blue:C.white,color:summaryView==="byRegion"?C.white:C.grayDark}}>By Region</button>
        <button onClick={()=>setSummaryView("byMetric")} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,border:`1px solid ${summaryView==="byMetric"?C.blue:C.gray}`,background:summaryView==="byMetric"?C.blue:C.white,color:summaryView==="byMetric"?C.white:C.grayDark}}>By Metric</button>
      </div>
    </div>

    {/* By Region view — existing group tables */}
    {summaryView==="byRegion"&&REGION_GROUPS.map(grp=><div key={grp.label} style={{marginBottom:24}}>
      <div style={{fontSize:12,fontWeight:700,color:C.darkBlue,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em",display:"flex",alignItems:"center",gap:8}}>
        <span>{grp.label}</span><div style={{flex:1,height:1,background:C.gray}}/>
      </div>
      <div style={{background:C.white,borderRadius:9,border:`1px solid ${C.gray}`,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.darkBlue}}>
                <th style={{padding:"9px 16px",textAlign:"left",fontSize:11,fontWeight:700,color:C.white,borderRight:`1px solid ${C.darkBlue4}`,whiteSpace:"nowrap",fontFamily:FONT}}>Region</th>
                {grp.metricKeys.map(k=>{const d=METRIC_DEFS[k];return <th key={k} style={{padding:"9px 10px",textAlign:"center",fontSize:10,fontWeight:700,color:C.white,borderRight:`1px solid ${C.darkBlue4}`,whiteSpace:"nowrap",fontFamily:FONT}}>{d.label}{!d.hib&&<span style={{display:"block",fontSize:8,color:C.grayMid,fontWeight:400}}>↓ lower=better</span>}</th>;})}
                <th style={{padding:"9px 10px",textAlign:"center",fontSize:11,fontWeight:700,color:C.blue,fontFamily:FONT}}>Overall</th>
              </tr>
              <tr style={{background:C.darkBlue3}}>
                <td style={{padding:"3px 16px",fontSize:10,color:C.grayMid,fontStyle:"italic",fontFamily:FONT}}>Target</td>
                {grp.metricKeys.map(k=><td key={k} style={{padding:"3px 10px",textAlign:"center",fontSize:10,color:C.grayMid,fontFamily:FONT}}>{fmtM(k,METRIC_DEFS[k].goal)}</td>)}
                <td style={{padding:"3px 10px",textAlign:"center",fontSize:10,color:C.grayMid,fontFamily:FONT}}>≥95.0%</td>
              </tr>
            </thead>
            <tbody>
              {grp.keys.map((rk,i)=>{const r=REGIONS[rk];const s=overallScore(r.metrics);return <tr key={rk} style={{background:i%2===0?C.white:C.offWhite,cursor:"pointer"}} onClick={()=>onDrillDown(rk)} onMouseEnter={e=>e.currentTarget.style.background=C.blueLight} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.white:C.offWhite}>
                <td style={{padding:"9px 16px",fontSize:13,fontWeight:700,color:C.darkBlue,borderBottom:`1px solid ${C.gray}`,borderRight:`1px solid ${C.gray}`,fontFamily:FONT}}>{r.label}</td>
                {grp.metricKeys.map(mk=>{const v=weeklyAvg(r.metrics[mk]);const h=metricHit(mk,v);return <td key={mk} style={{padding:"9px 10px",textAlign:"center",fontSize:13,fontWeight:700,color:perfColor(h),borderBottom:`1px solid ${C.gray}`,borderRight:`1px solid ${C.gray}`,fontFamily:FONT}}>{fmtM(mk,v)}</td>;})}
                <td style={{padding:"9px 10px",textAlign:"center",fontSize:13,fontWeight:700,color:s>=0.95?C.green:s>=0.90?C.amber:C.red,borderBottom:`1px solid ${C.gray}`,fontFamily:FONT}}>{pct(s)}</td>
              </tr>;})}
            </tbody>
          </table>
        </div>
      </div>
    </div>)}

    {/* By Metric view — one card per metric, all applicable regions */}
    {summaryView==="byMetric"&&<div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
      {["OT","COT","Scanning","POD","Call","Shortages","Preschedule","CES","RNS","Dwell"].filter(mk=>Object.values(REGIONS).some(r=>r.metrics[mk])).map(mk=>{
        const d=METRIC_DEFS[mk];
        const applicableRegions=Object.entries(REGIONS).filter(([rk])=>REGION_METRIC_KEYS[rk].includes(mk));
        return <div key={mk} style={{background:C.white,borderRadius:9,border:`1px solid ${C.gray}`,overflow:"hidden"}}>
          <div style={{background:C.darkBlue,padding:"9px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700,color:C.white,fontFamily:FONT}}>{d.label}</span>
            <span style={{fontSize:11,color:C.grayMid,fontFamily:FONT}}>Target: <strong style={{color:C.white}}>{fmtM(mk,d.goal)}</strong>{!d.hib&&<span style={{color:C.amber,marginLeft:6,fontSize:10}}>↓ lower=better</span>}</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.darkBlue3}}>
                <td style={{padding:"3px 16px",fontSize:10,color:C.grayMid,fontStyle:"italic",fontFamily:FONT}}>Region</td>
                <td style={{padding:"3px 10px",textAlign:"center",fontSize:10,color:C.grayMid,fontFamily:FONT}}>Current Week</td>
                <td style={{padding:"3px 10px",textAlign:"center",fontSize:10,color:C.grayMid,fontFamily:FONT}}>vs Target</td>
              </tr>
            </thead>
            <tbody>
              {applicableRegions.map(([rk,r],i)=>{
                const v=weeklyAvg(r.metrics[mk]);const h=metricHit(mk,v);
                const gap=d.hib?v-d.goal:d.goal-v;
                return <tr key={rk} style={{background:i%2===0?C.white:C.offWhite,cursor:"pointer"}} onClick={()=>onDrillDown(rk)} onMouseEnter={e=>e.currentTarget.style.background=C.blueLight} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.white:C.offWhite}>
                  <td style={{padding:"8px 16px",fontSize:13,fontWeight:700,color:C.darkBlue,borderBottom:`1px solid ${C.gray}`,borderRight:`1px solid ${C.gray}`,fontFamily:FONT}}>{r.label}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",fontSize:13,fontWeight:700,color:perfColor(h),borderBottom:`1px solid ${C.gray}`,borderRight:`1px solid ${C.gray}`,fontFamily:FONT}}>{fmtM(mk,v)}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",fontSize:12,fontWeight:700,color:perfColor(h),borderBottom:`1px solid ${C.gray}`,fontFamily:FONT}}>{gap>=0?"+":""}{(gap*100).toFixed(2)}pp</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>;
      })}
    </div>}
  </div>;
}

function App(){
  const [view,setView]=useState("summary");
  const [sheetsStatus,setSheetsStatus]=useState("demo"); // demo|loading|connected|error
  const [sheetsData,setSheetsData]=useState(null); // overrides loaded from Sheets
  const isConfigured = SHEETS_CONFIG.WEB_APP_URL && !SHEETS_CONFIG.WEB_APP_URL.includes("YOUR_APPS");

  React.useEffect(() => {
    if (!isConfigured) return;
    setSheetsStatus("loading");
    const tryLoad = async () => {
      try {
        const [kpiData, trendData] = await Promise.all([
          loadKPIMetrics(),
          loadDailyTrends(),
        ]);
        if (kpiData || trendData) {
          setSheetsData({ kpi: kpiData, trends: trendData });
          setSheetsStatus("connected");
          sheetsConnected = true;
        } else {
          setSheetsStatus("demo");
        }
      } catch(e) {
        sheetsError = e.message || String(e);
        setSheetsStatus("error");
      }
    };
    tryLoad();
  }, []);
  return <div style={{height:"100vh",background:C.offWhite,display:"flex",flexDirection:"column",fontFamily:FONT}}>
    <div style={{background:C.darkBlue,padding:"0 16px",display:"flex",justifyContent:"space-between",alignItems:"center",height:56,flexShrink:0,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:38,height:38,borderRadius:7,background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:C.white}}>CDS</div>
        <div>
          <div style={{fontSize:10,color:C.blue,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Daily Management</div>
          <div style={{fontSize:15,fontWeight:700,color:C.white}}>March 2026 Performance Dashboard</div>
        </div>
      </div>
      <div style={{display:"flex",gap:3,alignItems:"center",flexWrap:"wrap"}}>
        <SheetsStatus status={sheetsStatus} onExport={sheetsConnected?()=>exportAllToSheet(REGIONS,SAMPLE_DATA).then(()=>alert("✅ Data exported to Google Sheet!")):null}/>
        <button onClick={()=>setView("summary")} style={{background:view==="summary"?C.blue:"transparent",border:`1px solid ${view==="summary"?C.blue:C.darkBlue4}`,borderRadius:6,padding:"5px 12px",color:C.white,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>📊 Weekly Summary</button>
        <button onClick={()=>setView("trends")} style={{background:view==="trends"?C.blue:"transparent",border:`1px solid ${view==="trends"?C.blue:C.darkBlue4}`,borderRadius:6,padding:"5px 12px",color:C.white,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>📈 Trends</button>
        <div style={{width:1,height:20,background:C.darkBlue4,margin:"0 3px"}}/>
        {REGION_GROUPS.map((grp,gi)=><div key={gi} style={{display:"flex",gap:3,alignItems:"center"}}>
          {gi>0&&<div style={{width:1,height:16,background:C.darkBlue4,margin:"0 2px"}}/>}
          {grp.keys.map(k=><button key={k} onClick={()=>setView(k)} style={{background:view===k?C.blue:"transparent",border:`1px solid ${view===k?C.blue:C.darkBlue4}`,borderRadius:6,padding:"5px 9px",color:C.white,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:FONT}}>{REGIONS[k].label}</button>)}
        </div>)}
      </div>
    </div>
    <div style={{height:3,background:C.blue,flexShrink:0}}/>
    {view!=="summary"&&<div style={{background:C.darkBlue3,padding:"6px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap"}}>
      <button onClick={()=>setView("summary")} style={{background:"none",border:"none",color:C.blue,fontSize:12,fontWeight:600,cursor:"pointer",padding:0,fontFamily:FONT}}>← Summary</button>
      <span style={{color:C.grayMid}}>·</span>
      <span style={{fontSize:13,fontWeight:700,color:C.white}}>{REGIONS[view]?.label} Region</span>
      <span style={{fontSize:10,color:C.grayMid,marginLeft:4}}>{REGION_METRIC_KEYS[view]?.map(k=>METRIC_DEFS[k].label).join(" · ")}</span>
    </div>}
    <div style={{flex:1,overflow:"hidden"}}>
      {view==="summary"?<SummaryView onDrillDown={k=>setView(k)}/>:view==="trends"?<TrendsView/>:REGIONS[view]&&<RegionDashboard key={view} region={REGIONS[view]} regionKey={view} sheetsData={sheetsData}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
